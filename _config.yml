remote_theme: daviddarnes/alembic@main

# Site configuration
# 1. Files excluded from Jekyll builds
# 2. Installed Gems
# 3. Gem settings
# 4. Jekyll settings
# 5. Collections
# 6. Jekyll collections settings
# 7. Site settings
# 8. Site favicons & manifest icons
# 9. Site navigation

# 1. Files excluded from Jekyll builds
exclude:
- README.md
- CODE_OF_CONDUCT.md
- CONTRIBUTING.md
- screenshot.png
- LICENSE
- CNAME
- Gemfile
- Gemfile.lock
- alembic-jekyll-theme.gemspec
- .jekyll-cache

# 2. Installed Gems
plugins:
- jekyll-remote-theme
- jekyll-sitemap
- jekyll-mentions
- jekyll-paginate
- jekyll-seo-tag
- jekyll-redirect-from
- jekyll-feed
- jekyll-commonmark
- jekyll-include-cache
- jemoji

# 3. Gem settings
paginate: 2
paginate_path: blog/page:num
jekyll-mentions: https://twitter.com
author: Isidora Saavedra Urrea
social:
  name: Isidora Saavedra Urrea
  links:
    - https://github.com/isus418

# 4. Jekyll settings
sass:
  style: compressed
permalink: pretty
excerpt_separator: <!-- more -->
timezone: America/Santiago

# 5. Collections
collections:
  posts:
    title: Posts
    output: true
    description: "Notas y apuntes"
    feature_text: |
      Bitácora
    feature_image: "https://picsum.photos/2560/600?image=866"

# 6. Jekyll collections settings
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: post
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: page

# 7. Site settings
encoding: utf-8
lang: es-CL
title: "ISU"
description: 'Sitio creado como tarea del curso "Introducción al prototipado de bioinstrumentación", dictado por Tobias Wenzel.'
url: "https://isus418.github.io"
baseurl: ""
repo: "https://github.com/isus418/isus418.github.io"
css_inline: false

# 8. Site favicons & manifest icons
# favicons:
#   16: '/assets/logos/logo@16px.png'

# 9. Site navigation
navigation_header:
  - text: Inicio
    url: /
  - text: Experiencia
    url: /experiencia

navigation_footer:
- title: Creado por Isidora Saavedra · 2026
  url: https://isus418.github.io
- title: Tema Alembic por David Darnes
  url: https://alembic.darn.es

social_links:
  GitHub: https://github.com/isus418

sharing_links:
  Twitter: "#0d94e7"
  facebook: "#3B5998"
  Email: true

fonts:
  preconnect_urls:
    - https://fonts.gstatic.com
  font_urls:
    - https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap
